<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Testimonials</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
<style>
/* === ROOT === */
:root {
  --colors-blue: #1925aa;
  --colors-mercury: #e8e6e0;
  --colors-white: #fff;
  --font-pp-neue: 'DM Sans', sans-serif;
  --font-gta-mono: 'DM Mono', monospace;
  --spacing: 0.25rem;
  --ease-in-out: cubic-bezier(.4,0,.2,1);
}

*, ::after, ::before { box-sizing: border-box; }
* { margin: 0; -webkit-tap-highlight-color: transparent; }
body { background: var(--colors-white); color: var(--colors-blue); }
button { cursor: pointer; appearance: none; background: none; border: 0; color: inherit; font: inherit; padding: 0; }
svg { overflow: visible; display: block; }
img { display: block; max-width: 100%; }

/* === SECTION === */
.testimonials {
  background: var(--colors-white);
  padding-top:  calc(var(--spacing) * 50);
  padding-bottom: calc(var(--spacing) * 56);
  padding-left: calc(var(--spacing) * 15);
  padding-right: calc(var(--spacing) * 15);
}

/* === LABEL ROW === */
.label-row {
  display: grid;
  grid-template-columns: repeat(12, minmax(0,1fr));
  column-gap: calc(var(--spacing) * 15);
}
.label-row-inner {
  grid-column: 1 / -1;
  display: flex;
  justify-content: space-between;
  color: var(--colors-blue);
  font-family: var(--font-gta-mono);
  font-weight: 400;
  font-size: 0.75rem;
  line-height: 1;
  letter-spacing: 0;
  text-transform: uppercase;
}

/* === MAIN GRID === */
.main-grid {
  display: grid;
  grid-template-columns: repeat(12, minmax(0,1fr));
  column-gap: calc(var(--spacing) * 15);
  margin-top: calc(var(--spacing) * 50);
}

/* === QUOTE BLOCK === */
.quote-block {
  grid-column: 1 / -1;
  display: grid;
  grid-template-columns: subgrid;
  opacity: 0;
}
.quote-block.is-visible { opacity: 1; }

.quote-inner {
  grid-column: 1 / -1;
}

/* Quote stack */
.quote-stack-wrap {
  display: grid;
  grid-template-areas: "stack";
}
.quote-item {
  grid-area: stack;
  color: var(--colors-blue);
  font-family: var(--font-pp-neue);
  font-weight: 400;
  font-size: 2rem;
  line-height: 1;
  letter-spacing: 0;
  margin-bottom: calc(var(--spacing) * 80);
}

/* Line masking */
.line-mask {
  display: block;
  overflow: clip;
  position: relative;
}
.line-split {
  display: block;
  position: relative;
  margin-bottom: -0.1em;
  padding-bottom: 0.1em;
  will-change: transform, opacity;
}

/* Counter */
.quote-counter {
  display: flex;
  align-items: center;
  font-family: var(--font-gta-mono);
  font-weight: 400;
  font-size: 0.75rem;
  line-height: 1.2;
  text-transform: uppercase;
  letter-spacing: 0;
  color: var(--colors-blue);
  gap: 0.25rem;
  opacity: 0;
}
.quote-counter.is-visible { opacity: 1; transition: opacity 0.4s var(--ease-in-out); }
.counter-current {
  transition: opacity 0.3s ease-in-out;
}
.counter-current.fade-out { opacity: 0; }

/* Author info */
.quote-info-wrap {
  display: grid;
  grid-template-areas: "stack";
  opacity: 0;
}
.quote-info-wrap.is-visible { opacity: 1; transition: opacity 0.4s var(--ease-in-out) 0.15s; }

.quote-info {
  grid-area: stack;
  font-family: var(--font-gta-mono);
  font-weight: 400;
  font-size: 0.75rem;
  line-height: 1.2;
  text-transform: uppercase;
  letter-spacing: 0;
  color: var(--colors-blue);
  opacity: 0;
  transition: opacity 0.3s ease-in-out;
}
.quote-info.is-active {
  opacity: 1;
  transition-delay: 0.3s;
}

/* === SIDEBAR (logo + controls) === */
.sidebar {
  grid-column: 1 / -1;
  margin-top: calc(var(--spacing) * 80);
  display: flex;
  justify-content: space-between;
  align-items: center;
  opacity: 0;
}
.sidebar.is-visible { opacity: 1; transition: opacity 0.4s var(--ease-in-out) 0.2s; }

.logo-wrap {
  position: relative;
  height: calc(var(--spacing) * 60);
  display: flex;
  align-items: center;
}
.logo-wrap img {
  max-width: 12rem;
  height: 100%;
  object-fit: contain;
  width: auto;
  transition: opacity 0.3s ease-in-out;
}
.logo-wrap img.fade-out { opacity: 0; }

.controls-wrap {
  display: flex;
  gap: calc(var(--spacing) * 20);
  position: relative;
}

/* === ARROW BUTTON === */
.btn-controls {
  color: var(--colors-blue);
  border: 1px solid var(--colors-blue);
  border-radius: 50%;
  display: flex;
  width:  calc(var(--spacing) * 57);
  height: calc(var(--spacing) * 57);
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
  cursor: pointer;
  background: none;
  padding: 0;
  appearance: none;
  font: inherit;
}

.btn-controls .arrow-icon {
  width: calc(var(--spacing) * 20);
  height: calc(var(--spacing) * 9);
  color: inherit;
  position: relative;
  z-index: 0;
}
.btn-controls.is-prev .arrow-icon { transform: scaleX(-1); }

.btn-bg {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  background: var(--colors-blue);
  border-radius: 50%;
  transform: scale(0);
  transform-origin: bottom center;
}

.btn-arrow-hover {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 50%;
  width: 100%;
  height: 100%;
  z-index: 1;
  transform: translateY(-100%);
}
.btn-controls.is-prev .btn-arrow-hover { transform: translateY(100%); }

.btn-arrow-hover .arrow-icon {
  color: white;
}
.btn-controls.is-prev .btn-arrow-hover .arrow-icon { transform: scaleX(-1); }

/* === DESKTOP === */
@media (min-width: 1024px) {
  .testimonials { padding-bottom: 0; }

  .main-grid { margin-top: 0; }

  .quote-block {
    grid-column: 5 / -2;
    padding-top:  calc(var(--spacing) * 122);
    padding-bottom: calc(var(--spacing) * 124);
  }

  .quote-item { font-size: 2.875rem; margin-bottom: calc(var(--spacing) * 128); }

  .sidebar {
    grid-column: 3 / span 2;
    grid-row: 1;
    margin-top: 0;
    flex-direction: column;
    align-items: flex-start;
    padding-top:    calc(var(--spacing) * 122);
    padding-bottom: calc(var(--spacing) * 112);
    border-left: 1px solid var(--colors-blue);
    padding-left: 0;
    transform: translateX(-50%);
  }

  .logo-wrap {
    transform: translateX(-50%);
  }

  .controls-wrap {
    flex-direction: column;
    gap: calc(var(--spacing) * 20);
    transform: translateX(-50%);
  }

  .btn-controls .arrow-icon { transform: rotate(90deg); }
  .btn-controls.is-prev .arrow-icon { transform: rotate(90deg) scaleX(-1); }
  .btn-arrow-hover { transform: translateX(-100%); }
  .btn-controls.is-prev .btn-arrow-hover { transform: translateX(100%); }
}
</style>
</head>
<body>

<section class="testimonials" data-slice-type="testimonials">

  <h2 class="sr-only" style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)">Testimonials</h2>

  <!-- Label row -->
  <div class="label-row">
    <div class="label-row-inner">
      <div>Testimonials</div>
      <div aria-hidden="true">[OCI.3]</div>
    </div>
  </div>

  <!-- Main content grid -->
  <div class="main-grid">

    <!-- Quote block -->
    <div class="quote-block js-quote-block" id="quoteBlock">

      <div class="quote-inner">

        <!-- Stacked quotes -->
        <div class="quote-stack-wrap" id="quoteStack">
          <!-- Quotes injected by JS -->
        </div>

        <!-- Counter -->
        <div class="quote-counter" id="quoteCounter">
          <span class="counter-current" id="counterCurrent">01</span>
          <span>&nbsp;/&nbsp;</span>
          <span id="counterTotal">03</span>
        </div>

        <!-- Author info stack -->
        <div class="quote-info-wrap" id="quoteInfoWrap" style="margin-top:1rem;">
          <!-- Infos injected by JS -->
        </div>

      </div>
    </div>

    <!-- Sidebar: logo + controls -->
    <div class="sidebar" id="sidebar">

      <!-- Logo -->
      <div class="logo-wrap" id="logoWrap">
        <!-- Logo injected by JS -->
      </div>

      <!-- Controls -->
      <div class="controls-wrap">
        <button class="btn-controls is-prev" id="btnPrev" aria-label="Previous Testimonial">
          <svg class="arrow-icon" viewBox="0 0 20 9" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M19 4.5H1M1 4.5L5 1M1 4.5L5 8" stroke="currentColor" stroke-width="1.2"/>
          </svg>
          <span class="btn-bg"></span>
          <span class="btn-arrow-hover">
            <svg class="arrow-icon" viewBox="0 0 20 9" fill="none">
              <path d="M19 4.5H1M1 4.5L5 1M1 4.5L5 8" stroke="currentColor" stroke-width="1.2"/>
            </svg>
          </span>
        </button>

        <button class="btn-controls" id="btnNext" aria-label="Next Testimonial">
          <svg class="arrow-icon" viewBox="0 0 20 9" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M1 4.5H19M19 4.5L15 1M19 4.5L15 8" stroke="currentColor" stroke-width="1.2"/>
          </svg>
          <span class="btn-bg"></span>
          <span class="btn-arrow-hover">
            <svg class="arrow-icon" viewBox="0 0 20 9" fill="none">
              <path d="M1 4.5H19M19 4.5L15 1M19 4.5L15 8" stroke="currentColor" stroke-width="1.2"/>
            </svg>
          </span>
        </button>
      </div>

    </div>

  </div><!-- /.main-grid -->

</section>

<script>
gsap.registerPlugin(ScrollTrigger);

/* ── DATA ──────────────────────────────────────────────────────────── */
const testimonials = [
  {
    quote: '"I have worked with Outsource for many years on various projects, including the Lavelle School for the Blind. When we work with Outsource, we know that we are going to have a project that is completed on time."',
    author: 'T. Hanks',
    title: 'CRO',
    company: 'Gensler',
    logo: 'https://oci-awards.cdn.prismic.io/oci-awards/aYeO690YXLCxVj7r_Gensler_logo1.svg'
  },
  {
    quote: '"I have worked with Outsource for many years on various projects, including the Lavelle School for the Blind. When we work with Outsource, we know that we are going to have a project that is completed on time, within budget, and is guided by experience and expertise."',
    author: 'Ricky Gervais',
    title: 'CEO',
    company: 'Walmart',
    logo: 'https://upload.wikimedia.org/wikipedia/commons/thumb/1/14/Walmart_Spark.svg/120px-Walmart_Spark.svg.png'
  },
  {
    quote: '"Outsource Consultants bring a level of professionalism and deep expertise that is unmatched in the industry. They have consistently delivered results for our most complex New York City projects."',
    author: 'Stuart Pidd',
    title: 'CMO',
    company: 'Skanska',
    logo: 'https://upload.wikimedia.org/wikipedia/commons/thumb/7/7e/Skanska_logo.svg/200px-Skanska_logo.svg.png'
  }
];

/* ── STATE ─────────────────────────────────────────────────────────── */
let current  = 0;
let animating = false;
const timelines = []; // one GSAP timeline per quote

/* ── BUILD DOM ─────────────────────────────────────────────────────── */
const stack    = document.getElementById('quoteStack');
const infoWrap = document.getElementById('quoteInfoWrap');
const logoWrap = document.getElementById('logoWrap');

// Quotes
testimonials.forEach((t, i) => {
  const bq = document.createElement('blockquote');
  bq.className = 'quote-item js-quote';
  bq.setAttribute('role', 'group');
  bq.setAttribute('aria-label', t.quote);
  bq.innerHTML = splitIntoLines(t.quote);
  stack.appendChild(bq);
});

// Author infos
testimonials.forEach((t, i) => {
  const div = document.createElement('div');
  div.className = 'quote-info' + (i === 0 ? ' is-active' : '');
  div.innerHTML = `<div>${t.author}, ${t.title}</div><span>${t.company}</span>`;
  infoWrap.appendChild(div);
});

// Logo (first)
const logoImg = document.createElement('img');
logoImg.src = testimonials[0].logo;
logoImg.alt = testimonials[0].company;
logoImg.style.maxWidth = '12rem';
logoImg.style.height = '100%';
logoImg.style.objectFit = 'contain';
logoWrap.appendChild(logoImg);

// Counter total
document.getElementById('counterTotal').textContent = String(testimonials.length).padStart(2, '0');

/* ── SPLIT TEXT into line masks ──────────────────────────────────── */
function splitIntoLines(text) {
  // We wrap each word and let the browser reflow, then group by line.
  // For simplicity, we pre-split into ~7-word chunks as line masks.
  const words = text.split(' ');
  const chunkSize = 7;
  let html = '';
  for (let i = 0; i < words.length; i += chunkSize) {
    const line = words.slice(i, i + chunkSize).join(' ');
    html += `<span class="line-mask"><span class="line-split">${line}</span></span>`;
  }
  return html;
}

/* ── BUILD TIMELINES ────────────────────────────────────────────── */
function buildTimelines() {
  timelines.length = 0;
  document.querySelectorAll('.js-quote').forEach((bq, i) => {
    const lines = bq.querySelectorAll('.line-split');
    const tl = gsap.timeline({ paused: true });
    tl.fromTo(lines,
      { yPercent: 100, opacity: 0 },
      { yPercent: 0, opacity: 1, duration: 0.3, stagger: 0.05 }
    );
    timelines.push(tl);
    // Set initial state: first quote visible, rest hidden
    if (i === 0) {
      gsap.set(lines, { yPercent: 100, opacity: 0 });
    } else {
      gsap.set(lines, { yPercent: 100, opacity: 0 });
    }
  });
}

buildTimelines();

/* ── SCROLL TRIGGER: play first quote on enter ───────────────────── */
const quoteBlock = document.getElementById('quoteBlock');
quoteBlock.classList.add('is-visible');

ScrollTrigger.create({
  trigger: quoteBlock,
  start: 'top 50%',
  onEnter: (self) => {
    timelines[0].play();
    document.getElementById('quoteCounter').classList.add('is-visible');
    document.getElementById('quoteInfoWrap').classList.add('is-visible');
    document.getElementById('sidebar').classList.add('is-visible');
    self.kill();
  }
});

/* ── NAVIGATION ─────────────────────────────────────────────────── */
function goTo(next) {
  if (animating) return;
  animating = true;

  const prev = current;
  current = next;

  // Reverse current quote, then play next
  timelines[prev].reverse().then(() => {
    timelines[current].play().then(() => {
      animating = false;
    });
  });

  // Update author info
  document.querySelectorAll('.quote-info').forEach((el, i) => {
    el.classList.toggle('is-active', i === current);
  });

  // Update counter with fade
  const counterEl = document.getElementById('counterCurrent');
  counterEl.classList.add('fade-out');
  setTimeout(() => {
    counterEl.textContent = String(current + 1).padStart(2, '0');
    counterEl.classList.remove('fade-out');
  }, 300);

  // Update logo with fade
  logoImg.classList.add('fade-out');
  setTimeout(() => {
    logoImg.src = testimonials[current].logo;
    logoImg.alt = testimonials[current].company;
    logoImg.classList.remove('fade-out');
  }, 300);
}

document.getElementById('btnNext').addEventListener('click', () => {
  goTo((current + 1) % testimonials.length);
});
document.getElementById('btnPrev').addEventListener('click', () => {
  goTo(current === 0 ? testimonials.length - 1 : current - 1);
});

/* ── ARROW BUTTON HOVER ─────────────────────────────────────────── */
function initArrowButton(btn) {
  const bg       = btn.querySelector('.btn-bg');
  const arrowHover = btn.querySelector('.btn-arrow-hover');
  const isPrev   = btn.classList.contains('is-prev');
  const isLg     = () => window.innerWidth >= 1024;

  let enterTl, leaveTl;

  function getOrigins() {
    const lg = isLg();
    return {
      enter: lg ? (isPrev ? 'bottom center' : 'top center') : (isPrev ? 'right center' : 'left center'),
      leave: lg ? (isPrev ? 'top center'    : 'bottom center') : (isPrev ? 'left center'  : 'right center'),
    };
  }

  function getInitOffset() {
    const lg = isLg();
    return lg
      ? { yPercent: isPrev ? 100 : -100, xPercent: 0 }
      : { xPercent: isPrev ? 100 : -100, yPercent: 0 };
  }

  function getLeaveOffset() {
    const lg = isLg();
    return lg
      ? { yPercent: isPrev ? -100 : 100 }
      : { xPercent: isPrev ? -100 : 100 };
  }

  // Init
  gsap.set(bg, { scale: 0 });
  gsap.set(arrowHover, getInitOffset());

  btn.addEventListener('mouseenter', () => {
    if (leaveTl && leaveTl.progress() > 0 && leaveTl.progress() < 0.5) leaveTl.pause();

    const origins = getOrigins();
    gsap.set([bg, arrowHover], { transformOrigin: origins.enter });
    gsap.set(arrowHover, getInitOffset());

    enterTl = gsap.timeline({ defaults: { ease: 'power4.out' } })
      .to(bg, { scale: 1, duration: 0.5 })
      .to(arrowHover, { xPercent: 0, yPercent: 0, duration: 0.4 }, 0.1);
  });

  btn.addEventListener('mouseleave', () => {
    if (enterTl && enterTl.progress() > 0 && enterTl.progress() < 0.5) enterTl.pause();

    const origins = getOrigins();
    gsap.set([bg, arrowHover], { transformOrigin: origins.leave });

    leaveTl = gsap.timeline({ defaults: { ease: 'power4.out' } })
      .to(bg, { scale: 0, duration: 0.5 })
      .to(arrowHover, { ...getLeaveOffset(), duration: 0.4 }, 0);
  });
}

document.querySelectorAll('.btn-controls').forEach(initArrowButton);
</script>
</body>
</html>
